<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avi Agrawal | Rajneesh Trading Co.</title>
    <style>
        :root {
            /* Brand Colors for Maximum Pop */
            --brand-maroon: #5E1D5B; /* The deep purple/maroon from your card */
            --brand-gold: #FBC02D;   /* The bright yellow/gold from your card */
            --brand-red: #D81B60;    /* The red accent from your card */
            --bg-dark: #121212;
        }
        body {
            margin: 0;
            background: var(--bg-dark);
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            width: 360px;
            background: #fff;
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            animation: slideUp 0.8s ease-out;
            position: relative;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 1. SOLID COVER SECTION - Rich and Saturated */
        .cover-photo {
            height: 180px;
            /* Use a dark background to make gold/white pop */
            background-color: var(--brand-maroon); 
            
            /* PLACEHOLDER: Replace this URL with your actual three-bottle logo */
            background-image: url('https://5.imimg.com/data5/SELLER/Logo/2024/1/380941792/OU/LG/QL/6719003/-3ae77108-dadf-4563-81e4-6e901e7d4562-90x90.jpg'); 
            
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            position: relative;
            z-index: 1;
        }

        /* 2. RICH GOLD ACCENT BORDER */
        .cover-photo::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 8px; /* Thick enough to notice */
            background-color: var(--brand-gold);
            z-index: 2;
        }

        .profile-pic {
            width: 100px;
            height: 100px;
            /* Give the initial a colored background */
            background: var(--brand-maroon); 
            border-radius: 50%;
            position: absolute;
            bottom: -50px;
            left: 50%;
            transform: translateX(-50%);
            /* Solid border to pop against the white content */
            border: 5px solid var(--brand-gold); 
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 34px;
            font-weight: bold;
            color: var(--brand-gold); /* Gold text on maroon background */
            z-index: 3;
        }
        .content {
            padding: 70px 20px 20px;
            text-align: center;
        }
        .name { font-size: 26px; color: #333; margin: 0; font-weight: 700; }
        .tagline { color: #555; font-size: 15px; margin: 5px 0 30px; }
        
        /* 4. DYNAMIC ENTRY ANIMATION - Staggered Slide In */
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            margin-bottom: 15px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
            border: 1px solid #eee;
            color: #444;
            opacity: 0;
            animation: fadeInRight 0.5s ease-out forwards;
        }
        @keyframes fadeInRight {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .btn:nth-child(1) { animation-delay: 0.4s; }
        .btn:nth-child(2) { animation-delay: 0.6s; }
        .btn:nth-child(3) { animation-delay: 0.8s; }
        .btn:nth-child(4) { animation-delay: 1s; }

        .btn:hover {
            transform: scale(1.05);
            background: var(--brand-maroon) !important;
            color: white !important;
            border: none;
            box-shadow: 0 5px 15px rgba(74, 21, 75, 0.4);
        }
        
        /* WHATSAPP PULSE - High Visibility */
        .btn-wa { 
            background: #25D366; 
            color: white !important; 
            border: none;
            animation: pulse 2.5s infinite, fadeInRight 0.5s ease-out forwards; 
            animation-delay: 0.2s, 0.2s; /* WhatsApp slides in first */
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.6); }
            70% { box-shadow: 0 0 0 18px rgba(37, 211, 102, 0); }
            100% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); }
        }
    </style>
</head>
<body>

<div class="card">
    <div class="cover-photo">
        <div class="profile-pic">AA</div>
    </div>
    
    <div class="content">
        <h1 class="name">Avi Agrawal</h1>
        <p class="tagline">Rajneesh Trading Co. | Indore</p>
        
        <div class="links">

            <a href="tel:+918962962340" class="btn">📞 Call Now</a>
            <a href="https://www.rajneeshbottletrading.com" class="btn">🌐 Visit Website</a>

        </div>
    </div>
</div>

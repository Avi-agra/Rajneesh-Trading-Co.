<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avi Agrawal | Rajneesh Trading Co.</title>
    <style>
        :root {
            --brand-maroon: #5E1D5B; /* The deep maroon from your card */
            --brand-gold: #FBC02D;   /* The vibrant gold from your card */
            --bg-dark: #121212;
        }

        body {
            margin: 0;
            background: var(--bg-dark);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            width: 360px;
            background: #fff;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            animation: slideUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
            position: relative;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(60px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* COVER PHOTO SECTION - Using your office photo */
        .cover-photo {
            height: 200px;
            background-image: linear-gradient(to bottom, rgba(94, 29, 91, 0.4), rgba(94, 29, 91, 0.8)), url('office.jpg');
            background-size: cover;
            background-position: center;
            position: relative;
            z-index: 1;
        }

        /* Gold Divider Line */
        .cover-photo::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: var(--brand-gold);
            z-index: 2;
        }

        .profile-pic {
            width: 110px;
            height: 110px;
            background: white;
            border-radius: 50%;
            position: absolute;
            bottom: -55px;
            left: 50%;
            transform: translateX(-50%);
            border: 4px solid var(--brand-gold);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3;
            overflow: hidden;
        }

        .profile-pic img {
            width: 85%;
            height: 85%;
            object-fit: contain;
        }

        .content {
            padding: 75px 25px 30px;
            text-align: center;
        }

        .name { 
            font-size: 28px; 
            color: #222; 
            margin: 0; 
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .tagline { 
            color: #666; 
            font-size: 14px; 
            margin: 8px 0 30px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        /* INTERACTIVE BUTTONS */
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            margin-bottom: 15px;
            border-radius: 15px;
            text-decoration: none;
            font-weight: 700;
            transition: all 0.3s ease;
            border: 1px solid #f0f0f0;
            color: #333;
            opacity: 0;
            transform: translateX(30px);
            animation: fadeInRight 0.6s ease-out forwards;
        }

        @keyframes fadeInRight {
            to { opacity: 1; transform: translateX(0); }
        }

        .btn:nth-child(1) { animation-delay: 0.3s; }
        .btn:nth-child(2) { animation-delay: 0.5s; }
        .btn:nth-child(3) { animation-delay: 0.7s; }
        .btn:nth-child(4) { animation-delay: 0.9s; }

        .btn:hover {
            transform: translateY(-3px);
            background: var(--brand-maroon);
            color: #fff !important;
            box-shadow: 0 10px 20px rgba(94, 29, 91, 0.3);
        }

        .btn-wa {
            background: #25D366;
            color: white !important;
            border: none;
            animation: pulse 2s infinite, fadeInRight 0.6s ease-out forwards;
            animation-delay: 0s, 0.3s;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.5); }
            70% { box-shadow: 0 0 0 15px rgba(37, 211, 102, 0); }
            100% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); }
        }

        .footer-text {
            font-size: 11px;
            color: #bbb;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="cover-photo">
        <div class="profile-pic">
            <img src="./_3ae77108-dadf-4563-81e4-6e901e7d4562.jpg" alt="Rajneesh Trading Logo">
        </div>
    </div>
    
    <div class="content">
        <h1 class="name">Avi Agrawal</h1>
        <p class="tagline">Rajneesh Trading Co. | Indore</p>
        
        <div class="links">
            <a href="https://wa.me/918962962340?text=Hello%20Avi,%20I%20found%20your%20digital%20card%20and%20wanted%20to%20inquire%20about%20packaging." class="btn btn-wa">
                💬 WhatsApp Inquiry
            </a>
            
            <a href="tel:+918962962340" class="btn">
                📞 Call Directly
            </a>
            
            <a href="https://www.rajneeshbottletrading.com" class="btn">
                🌐 Official Website
            </a>
            
            <a href="GOOGLE_MAPS_LINK" class="btn">
                📍 Visit Our Office
            </a>
        </div>
        
        <p class="footer-text">Premium Pharma & Cosmetic Packaging Solutions</p>
    </div>
</div>

</body>
</html>
